name: Go CI Pipeline

on:
  push:
    branches: [feature/**, hotfix/**, bugfix/**, release/**]
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, closed]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Build project
        run: go build ./...

      - name: Run tests with coverage
        run: |
          PKGS=$(go list ./... | grep -v /cmd/ | paste -sd, -)
          go test $(go list ./... | grep -v /cmd/) -v -coverprofile=coverage.out -coverpkg="$PKGS" | tee test-report.txt

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Show coverage
        run: go tool cover -func=coverage.out

      - name: Fail if coverage < 80%
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"

          if [ $(echo "$COVERAGE < 80" | bc) -eq 1 ]; then
            echo "❌ Coverage is below 80%"
            exit 1
          else
            echo "✅ Coverage requirement satisfied"
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-reports
          if-no-files-found: warn
          path: |
            coverage.out
            coverage.html
            test-report.txt      
